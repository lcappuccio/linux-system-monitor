name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        uses: GabrielBB/xvfb-action@v1
        with:
          run: mvn -B clean test

      - name: Checkstyle
        uses: GabrielBB/xvfb-action@v1
        with:
          run: mvn -B checkstyle:check

      - name: SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: GabrielBB/xvfb-action@v1
        with:
          run: mvn -B jacoco:report sonar:sonar -Psonar
